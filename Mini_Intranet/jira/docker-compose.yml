version: "3.9"

services:
  jira:
    image: atlassian/jira-software:8.20.0
    container_name: jira
    ports:
      - "8080:8080"
    depends_on:
      jira-db:
        condition: service_healthy
    environment:
      - ATL_JDBC_URL=jdbc:postgresql://jira-db:5432/jiradb
      - ATL_JDBC_USER=jira
      - ATL_JDBC_PASSWORD=jira123
      - ATL_DB_DRIVER=org.postgresql.Driver
      - ATL_DB_TYPE=postgres72
    volumes:
      - jira_data:/var/atlassian/application-data/jira
    networks:
      - intranet-net

  jira-db:
    image: postgres:12
    container_name: jira-db
    environment:
      - POSTGRES_DB=jiradb
      - POSTGRES_USER=jira
      - POSTGRES_PASSWORD=jira123
    volumes:
      - jira_db_data:/var/lib/postgresql/data
    networks:
      - intranet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira -d jiradb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jira_data:
  jira_db_data:

networks:
  intranet-net:
    driver: bridge